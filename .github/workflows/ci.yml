name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (lint, type, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bos
          POSTGRES_PASSWORD: bos
          POSTGRES_DB: bos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://bos:bos@localhost:5432/bos
        run: alembic upgrade head
      - name: Tests
        env:
          DATABASE_URL: postgresql+psycopg://bos:bos@localhost:5432/bos
        run: pytest -q

  worker:
    name: Worker (lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  web:
    name: Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
